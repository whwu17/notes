<div id="site-search" class="site-search" data-baseurl="{{ '/' | relative_url }}">
  <div class="site-search-dialog" role="dialog" aria-modal="true" aria-label="Search posts" hidden>
    <div class="site-search-panel">
      <label class="visually-hidden" for="site-search-input">Search posts</label>
      <input id="site-search-input" class="site-search-input" type="search" placeholder="Search posts…" autocomplete="off" spellcheck="false">
      <button type="button" class="site-search-close" aria-label="Close search">&times;</button>
      <div class="site-search-results" hidden></div>
      <p class="site-search-hint">Press <kbd>Ctrl</kbd>+<kbd>K</kbd> to search</p>
    </div>
  </div>
</div>
